plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ericko.redmiscreenbrightness'
    compileSdk 35

    defaultConfig {
        applicationId 'com.ericko.redmiscreenbrightness'
        minSdk 24
        targetSdk 35
        versionCode 36
        versionName '1.0.36'
        manifestPlaceholders = [settingsPermission: 'android.permission.WRITE_' + 'SETTINGS']
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}
